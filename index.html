<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard รายงานการผลิต Gravure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Archivo:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     ตั้งค่าสี / ฟอนต์ ทั้งหมดอยู่ตรงนี้ -- แก้ที่นี่ที่เดียว
     ============================================================ */
  :root {
    --bg:        #14181d;
    --panel:     #1c2228;
    --panel-2:   #232b33;
    --line:      #323c46;
    --text:      #e8edf2;
    --text-dim:  #8b97a3;
    --accent:    #ffb000;   /* เหลืองอำพัน - สีหลัก */
    --good:      #4ade80;   /* เขียว */
    --bad:       #f87171;   /* แดง - ของเสีย */
    --blue:      #60a5fa;
    --radius:    14px;
    --shadow:    0 6px 24px rgba(0,0,0,.35);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(255,176,0,.06) 0%, transparent 45%),
      radial-gradient(circle at 90% 100%, rgba(96,165,250,.05) 0%, transparent 45%);
    color: var(--text);
    font-family: 'IBM Plex Sans Thai', sans-serif;
    min-height: 100vh;
    padding: 28px clamp(16px, 4vw, 56px);
  }

  /* ---------- หน้า login รหัสผ่าน ---------- */
  #lockScreen {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
  }
  #lockScreen h2 {
    font-family: 'Archivo', sans-serif; font-weight: 800;
    font-size: 24px; letter-spacing: .5px;
  }
  #lockScreen .sub { color: var(--text-dim); font-size: 14px; margin-top:-12px; }
  #pwInput {
    background: var(--panel); border: 1px solid var(--line);
    color: var(--text); padding: 14px 18px; border-radius: 10px;
    font-size: 16px; width: 260px; text-align: center;
    font-family: 'IBM Plex Sans Thai', sans-serif;
  }
  #pwInput:focus { outline: 2px solid var(--accent); }
  #pwBtn {
    background: var(--accent); color: #1a1a1a; border: none;
    padding: 13px 38px; border-radius: 10px; font-size: 15px;
    font-weight: 700; cursor: pointer;
    font-family: 'IBM Plex Sans Thai', sans-serif;
  }
  #pwBtn:active { transform: translateY(1px); }
  #pwError { color: var(--bad); font-size: 13px; height: 16px; }

  /* ---------- header ---------- */
  header {
    display: flex; justify-content: space-between; align-items: flex-end;
    flex-wrap: wrap; gap: 16px;
    padding-bottom: 18px; margin-bottom: 24px;
    border-bottom: 2px solid var(--line);
  }
  .title-block h1 {
    font-family: 'Archivo', sans-serif; font-weight: 900;
    font-size: clamp(22px, 3vw, 34px); letter-spacing: -.5px;
    line-height: 1.05;
  }
  .title-block h1 span { color: var(--accent); }
  .title-block .machines {
    color: var(--text-dim); font-size: 13px; margin-top: 6px;
    letter-spacing: .3px;
  }
  .updated {
    text-align: right; font-size: 13px; color: var(--text-dim);
  }
  .updated strong { color: var(--text); font-weight: 600; }
  .updated .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--good); margin-right: 6px;
    box-shadow: 0 0 8px var(--good);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 50% { opacity: .35; } }

  /* ---------- การ์ด KPI แถวบน ---------- */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px; margin-bottom: 24px;
  }
  .kpi {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 22px;
    box-shadow: var(--shadow);
    position: relative; overflow: hidden;
  }
  .kpi::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; background: var(--accent);
  }
  .kpi.good::before { background: var(--good); }
  .kpi.bad::before  { background: var(--bad); }
  .kpi.blue::before { background: var(--blue); }
  .kpi .label {
    font-size: 13px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: .5px;
    margin-bottom: 10px;
  }
  .kpi .value {
    font-family: 'Archivo', sans-serif; font-weight: 800;
    font-size: clamp(28px, 3.5vw, 40px); line-height: 1;
  }
  .kpi .value .unit {
    font-size: 15px; color: var(--text-dim); font-weight: 600;
    margin-left: 4px;
  }
  .kpi .sub {
    font-size: 12.5px; color: var(--text-dim); margin-top: 10px;
  }

  /* ---------- layout ส่วนล่าง ---------- */
  .grid {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: var(--shadow);
  }
  .panel h3 {
    font-family: 'Archivo', sans-serif; font-weight: 700;
    font-size: 16px; letter-spacing: .3px;
    margin-bottom: 18px;
    display: flex; align-items: center; gap: 8px;
  }
  .panel h3::before {
    content: ''; width: 14px; height: 14px; border-radius: 4px;
    background: var(--accent);
  }

  /* ---------- ตาราง operator / สถานะ ---------- */
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; font-size: 12px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: .4px;
    padding: 8px 10px; border-bottom: 1px solid var(--line);
    font-weight: 600;
  }
  th.num, td.num { text-align: right; }
  td {
    padding: 12px 10px; font-size: 14.5px;
    border-bottom: 1px solid rgba(50,60,70,.5);
  }
  tr:last-child td { border-bottom: none; }
  td.name { font-weight: 600; }
  .rank {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 6px;
    background: var(--panel-2); color: var(--text-dim);
    font-size: 12px; font-weight: 700; margin-right: 10px;
  }
  tr:nth-child(1) .rank { background: var(--accent); color: #1a1a1a; }
  .bar-cell { width: 30%; }
  .bar-track {
    background: var(--panel-2); border-radius: 4px;
    height: 8px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; background: var(--accent); border-radius: 4px;
    transition: width .6s ease;
  }
  .waste-tag {
    font-size: 12px; padding: 2px 8px; border-radius: 6px;
    background: rgba(248,113,113,.15); color: var(--bad);
    font-weight: 600;
  }
  .waste-tag.low { background: rgba(74,222,128,.15); color: var(--good); }

  /* ---------- สถานะงาน chips ---------- */
  .status-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .status-card {
    background: var(--panel-2); border-radius: 10px;
    padding: 14px 16px; border: 1px solid var(--line);
  }
  .status-card .s-label { font-size: 13px; color: var(--text-dim); }
  .status-card .s-value {
    font-family: 'Archivo', sans-serif; font-weight: 700;
    font-size: 22px; margin-top: 4px;
  }
  .status-card .s-machine {
    font-size: 11px; color: var(--text-dim); margin-top: 2px;
  }

  footer {
    margin-top: 28px; text-align: center;
    color: var(--text-dim); font-size: 12px;
    padding-top: 16px; border-top: 1px solid var(--line);
  }

  /* loading / error */
  .state-msg {
    text-align: center; padding: 80px 20px; color: var(--text-dim);
    font-size: 15px;
  }
  .hidden { display: none !important; }

  /* fade in */
  .fade-in { animation: fadeIn .5s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } }
</style>
</head>
<body>

<!-- ============ หน้า login รหัสผ่าน ============ -->
<div id="lockScreen">
  <h2>DASHBOARD การผลิต GRAVURE</h2>
  <div class="sub">กรอกรหัสผ่านเพื่อเข้าใช้งาน</div>
  <input type="password" id="pwInput" placeholder="รหัสผ่าน" autocomplete="off">
  <button id="pwBtn">เข้าสู่ระบบ</button>
  <div id="pwError"></div>
</div>

<!-- ============ เนื้อหา Dashboard ============ -->
<div id="app" class="hidden">

  <header>
    <div class="title-block">
      <h1>รายงานการผลิต <span>GRAVURE</span></h1>
      <div class="machines">GD10 Dynastar &nbsp;·&nbsp; GX10 Heliostar</div>
    </div>
    <div class="updated">
      <div><span class="dot"></span>อัปเดตล่าสุด</div>
      <div><strong id="updatedAt">-</strong></div>
    </div>
  </header>

  <div id="loading" class="state-msg">กำลังโหลดข้อมูล...</div>
  <div id="error" class="state-msg hidden"></div>

  <div id="content" class="hidden">

    <!-- KPI แถวบน -->
    <div class="kpi-row" id="kpiRow"></div>

    <!-- ส่วนล่าง 2 คอลัมน์ -->
    <div class="grid">
      <div class="panel">
        <h3>ผลงานรายพนักงาน (Operator)</h3>
        <table>
          <thead>
            <tr>
              <th>ชื่อ</th>
              <th class="bar-cell">สัดส่วน</th>
              <th class="num">ผลิตสุทธิ (ม.)</th>
              <th class="num">% เสีย</th>
            </tr>
          </thead>
          <tbody id="operatorBody"></tbody>
        </table>
      </div>

      <div class="panel">
        <h3>Top 10 ลูกค้า (ตามยอดผลิต)</h3>
        <table>
          <thead>
            <tr>
              <th>ลูกค้า</th>
              <th class="num">ยอดผลิต (ม.)</th>
            </tr>
          </thead>
          <tbody id="customerBody"></tbody>
        </table>
      </div>
    </div>

    <!-- สถานะงาน -->
    <div class="panel" style="margin-top:16px;">
      <h3>แยกตามสถานะงาน</h3>
      <div class="status-grid" id="statusGrid"></div>
    </div>

    <footer id="footer"></footer>
  </div>
</div>

<script>
/* ============================================================
   ตั้งค่า -- แก้ตรงนี้
   ============================================================ */
var USE_PASSWORD  = true;          // false = ไม่ต้องใส่รหัสผ่าน
var PAGE_PASSWORD = 'gravure2026';    // เปลี่ยนเป็นรหัสที่ต้องการ
var DATA_URL      = 'data.json';   // อยู่ repo เดียวกัน ไม่ต้องแก้
var AUTO_REFRESH_MINUTES = 10;     // รีเฟรชข้อมูลอัตโนมัติทุกกี่นาที

/* ============================================================
   ระบบรหัสผ่าน
   ============================================================ */
(function initLock() {
  var lock = document.getElementById('lockScreen');
  var app  = document.getElementById('app');

  if (!USE_PASSWORD) {
    lock.classList.add('hidden');
    app.classList.remove('hidden');
    loadData();
    return;
  }

  // เคยใส่รหัสถูกแล้วในรอบ session นี้ -> ไม่ต้องถามซ้ำ
  if (sessionStorage.getItem('gv_ok') === '1') {
    lock.classList.add('hidden');
    app.classList.remove('hidden');
    loadData();
    return;
  }

  var input = document.getElementById('pwInput');
  var btn   = document.getElementById('pwBtn');
  var errEl = document.getElementById('pwError');

  function tryLogin() {
    if (input.value === PAGE_PASSWORD) {
      sessionStorage.setItem('gv_ok', '1');
      lock.classList.add('hidden');
      app.classList.remove('hidden');
      loadData();
    } else {
      errEl.textContent = 'รหัสผ่านไม่ถูกต้อง';
      input.value = '';
      input.focus();
    }
  }
  btn.addEventListener('click', tryLogin);
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') tryLogin();
  });
  input.focus();
})();

/* ============================================================
   โหลดข้อมูลจาก data.json
   ============================================================ */
function loadData() {
  var loading = document.getElementById('loading');
  var errorEl = document.getElementById('error');
  var content = document.getElementById('content');

  // เติม ?t=... กันเบราว์เซอร์ cache ข้อมูลเก่า
  fetch(DATA_URL + '?t=' + Date.now())
    .then(function (res) {
      if (!res.ok) throw new Error('โหลดไฟล์ไม่สำเร็จ (HTTP ' + res.status + ')');
      return res.json();
    })
    .then(function (data) {
      loading.classList.add('hidden');
      errorEl.classList.add('hidden');
      content.classList.remove('hidden');
      content.classList.add('fade-in');
      render(data);
    })
    .catch(function (err) {
      loading.classList.add('hidden');
      content.classList.add('hidden');
      errorEl.classList.remove('hidden');
      errorEl.innerHTML = 'ไม่สามารถโหลดข้อมูลได้<br><span style="font-size:13px">' +
                          err.message + '</span>';
    });
}

// รีเฟรชอัตโนมัติ
setInterval(function () {
  if (!document.getElementById('app').classList.contains('hidden')) {
    loadData();
  }
}, AUTO_REFRESH_MINUTES * 60 * 1000);

/* ============================================================
   แสดงผลข้อมูล
   ============================================================ */
function nf(n) {
  // ใส่ comma คั่นหลักพัน
  return (n || 0).toLocaleString('en-US');
}

function render(data) {
  document.getElementById('updatedAt').textContent = data.meta.updatedAt;

  renderKPI(data.summary);
  renderOperators(data.byOperator);
  renderCustomers(data.topCustomers);
  renderStatus(data.byStatus);

  document.getElementById('footer').textContent =
    'ข้อมูลจากชีท GD10 (' + nf(data.meta.rowsGD10) + ' แถว) · GX10 (' +
    nf(data.meta.rowsGX10) + ' แถว) · อัปเดตอัตโนมัติทุกชั่วโมง';
}

function renderKPI(s) {
  var cards = [
    { cls: '',     label: 'ผลิตสุทธิรวม',  value: nf(s.netMetersTotal),  unit: 'ม.',
      sub: 'GD10 ' + nf(s.netMetersGD10) + ' · GX10 ' + nf(s.netMetersGX10) },
    { cls: 'bad',  label: 'ของเสียรวม',    value: nf(s.wasteMetersTotal), unit: 'ม.',
      sub: 'GD10 ' + nf(s.wasteMetersGD10) + ' · GX10 ' + nf(s.wasteMetersGX10) },
    { cls: 'good', label: '% ของเสียรวม',  value: s.wastePercentTotal,   unit: '%',
      sub: 'GD10 ' + s.wastePercentGD10 + '% · GX10 ' + s.wastePercentGX10 + '%' },
    { cls: 'blue', label: 'ผลิตรวม (สุทธิ+เสีย)', value: nf(s.netMetersTotal + s.wasteMetersTotal), unit: 'ม.',
      sub: 'ปริมาณงานที่ผ่านเครื่องทั้งหมด' }
  ];
  document.getElementById('kpiRow').innerHTML = cards.map(function (c) {
    return '<div class="kpi ' + c.cls + '">' +
             '<div class="label">' + c.label + '</div>' +
             '<div class="value">' + c.value +
               '<span class="unit">' + c.unit + '</span></div>' +
             '<div class="sub">' + c.sub + '</div>' +
           '</div>';
  }).join('');
}

function renderOperators(ops) {
  if (!ops || !ops.length) {
    document.getElementById('operatorBody').innerHTML =
      '<tr><td colspan="4" style="color:var(--text-dim)">ไม่มีข้อมูล</td></tr>';
    return;
  }
  var max = Math.max.apply(null, ops.map(function (o) { return o.net; })) || 1;
  document.getElementById('operatorBody').innerHTML = ops.map(function (o, i) {
    var wasteCls = o.wastePercent <= 5 ? 'low' : '';
    var barPct = Math.round((o.net / max) * 100);
    return '<tr>' +
      '<td class="name"><span class="rank">' + (i + 1) + '</span>' + o.name + '</td>' +
      '<td class="bar-cell"><div class="bar-track">' +
        '<div class="bar-fill" style="width:' + barPct + '%"></div></div></td>' +
      '<td class="num">' + nf(o.net) + '</td>' +
      '<td class="num"><span class="waste-tag ' + wasteCls + '">' +
        o.wastePercent + '%</span></td>' +
    '</tr>';
  }).join('');
}

function renderCustomers(customers) {
  if (!customers || !customers.length) {
    document.getElementById('customerBody').innerHTML =
      '<tr><td colspan="2" style="color:var(--text-dim)">ไม่มีข้อมูล</td></tr>';
    return;
  }
  document.getElementById('customerBody').innerHTML = customers.map(function (c, i) {
    return '<tr>' +
      '<td class="name"><span class="rank">' + (i + 1) + '</span>' + c.name + '</td>' +
      '<td class="num">' + nf(c.meters) + '</td>' +
    '</tr>';
  }).join('');
}

function renderStatus(byStatus) {
  // รวมสถานะจากทั้ง 2 เครื่อง
  var allStatuses = {};
  ['GD10', 'GX10'].forEach(function (m) {
    var d = byStatus[m] || {};
    for (var st in d) {
      if (!allStatuses[st]) allStatuses[st] = { GD10: 0, GX10: 0 };
      allStatuses[st][m] = d[st].net;
    }
  });

  var keys = Object.keys(allStatuses);
  if (!keys.length) {
    document.getElementById('statusGrid').innerHTML =
      '<div style="color:var(--text-dim)">ไม่มีข้อมูล</div>';
    return;
  }
  document.getElementById('statusGrid').innerHTML = keys.map(function (st) {
    var v = allStatuses[st];
    var total = v.GD10 + v.GX10;
    return '<div class="status-card">' +
      '<div class="s-label">' + st + '</div>' +
      '<div class="s-value">' + nf(total) + ' <span style="font-size:13px;color:var(--text-dim)">ม.</span></div>' +
      '<div class="s-machine">GD10 ' + nf(v.GD10) + ' · GX10 ' + nf(v.GX10) + '</div>' +
    '</div>';
  }).join('');
}
</script>

</body>
</html>
